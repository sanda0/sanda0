<style>
  :root {
    --bg: #0d0f12;
    --surface: #15181d;
    --text: #e6e6e6;
    --muted: #8b939e;
    --accent: #7ee787;
    --border: #232830;
    --mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); line-height: 1.6; font-size: 16px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
  .back { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; display: block; }
  .back:hover { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 32px; }
  h1::before { content: "// "; color: var(--accent); }
  .page-desc { color: var(--muted); font-size: 0.875rem; margin-top: -16px; margin-bottom: 28px; }
  .contact-list { display: flex; flex-direction: column; gap: 12px; font-size: 0.95rem; }
  .contact-row { display: flex; gap: 12px; }
  .contact-label { color: var(--muted); min-width: 80px; flex-shrink: 0; }
  .contact-row a, .contact-row span { overflow-wrap: break-word; word-break: break-all; min-width: 0; }
  footer { border-top: 1px solid var(--border); padding-top: 24px; color: var(--muted); font-size: 0.8rem; margin-top: 64px; }
  @media (max-width: 480px) {
    .wrap { padding: 40px 18px 64px; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
