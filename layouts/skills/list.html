<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — Sandakelum</title>
{{ partial "seo.html" . }}
<style>
  :root {
    --bg: #0d0f12;
    --surface: #15181d;
    --text: #e6e6e6;
    --muted: #8b939e;
    --accent: #7ee787;
    --border: #232830;
    --mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); line-height: 1.6; font-size: 16px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
  .back { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; display: block; }
  .back:hover { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 32px; }
  h1::before { content: "// "; color: var(--accent); }
  .skills-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .skill { border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; font-size: 0.88rem; color: var(--muted); }
  footer { border-top: 1px solid var(--border); padding-top: 24px; color: var(--muted); font-size: 0.8rem; margin-top: 64px; }
</style>
</head>
<body>
<div class="wrap">

  <a href="/" class="back">← sandakelum.me</a>

  <h1>skills</h1>

  <div class="skills-list">
    {{ range .Params.skills }}
    <span class="skill">{{ . }}</span>
    {{ end }}
  </div>

  <footer>
    built with hugo — &copy; {{ now.Format "2006" }} Sandakelum
  </footer>

</div>
</body>
</html>
