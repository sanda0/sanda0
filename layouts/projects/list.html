<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Sandakelum</title>
{{ partial "seo.html" . }}
<style>
  :root {
    --bg: #0d0f12;
    --surface: #15181d;
    --text: #e6e6e6;
    --muted: #8b939e;
    --accent: #7ee787;
    --border: #232830;
    --mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); line-height: 1.6; font-size: 16px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
  .back { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; display: block; }
  .back:hover { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 32px; }
  h1::before { content: "// "; color: var(--accent); }
  .projects { display: flex; flex-direction: column; gap: 16px; }
  .project { border: 1px solid var(--border); background: var(--surface); border-radius: 6px; padding: 20px; transition: border-color 0.15s ease; }
  .project:hover { border-color: var(--accent); }
  .project-title { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .project-title h3 { font-size: 1.05rem; font-weight: 600; }
  .project-tags { font-size: 0.78rem; color: var(--accent); white-space: nowrap; }
  .project p { margin-top: 8px; font-size: 0.92rem; color: var(--muted); }
  .project-links { margin-top: 12px; font-size: 0.85rem; display: flex; gap: 16px; }
  footer { border-top: 1px solid var(--border); padding-top: 24px; color: var(--muted); font-size: 0.8rem; margin-top: 64px; }
  @media (max-width: 480px) {
    .wrap { padding: 40px 18px 64px; }
    h1 { font-size: 1.2rem; }
    .project-tags { white-space: normal; }
    .project-links { flex-wrap: wrap; gap: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <a href="{{ "/" | relURL }}" class="back">← sandakelum.me</a>

  <h1>projects</h1>

  <div class="projects">
    {{ range sort .Pages "Params.weight" }}
    <div class="project">
      <div class="project-title">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <span class="project-tags">{{ .Params.tags_display }}</span>
      </div>
      <p>{{ .Summary }}</p>
      {{ if .Params.links }}
      <div class="project-links">
        {{ range .Params.links }}
        <a href="{{ .url }}" target="_blank" rel="noopener">{{ .label }}</a>
        {{ end }}
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>

  <footer>
    built with hugo — &copy; {{ now.Format "2006" }} Sandakelum
  </footer>

</div>
</body>
</html>
