<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Sandakelum</title>
{{ partial "seo.html" . }}
<style>
  :root {
    --bg: #0d0f12;
    --surface: #15181d;
    --text: #e6e6e6;
    --muted: #8b939e;
    --accent: #7ee787;
    --border: #232830;
    --mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); line-height: 1.6; font-size: 16px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 64px 24px 96px; }
  .back { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; display: block; }
  .back:hover { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 24px; }
  h1::before { content: "// "; color: var(--accent); }

  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 4px 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    color: var(--accent);
    border-color: var(--accent);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 640px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 400px) {
    .gallery-grid { grid-template-columns: 1fr; }
  }

  .gallery-item {
    position: relative;
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }
  .gallery-item:hover { border-color: var(--accent); }
  .gallery-item img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
  }
  .gallery-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    font-size: 0.75rem;
    color: #fff;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-location::before { content: "📍 "; }

  /* lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
  }
  .lightbox-caption {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 28px;
    font-size: 1.6rem;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    background: none;
    border: none;
    font-family: var(--mono);
    transition: color 0.15s;
  }
  .lightbox-close:hover { color: var(--accent); }

  footer { border-top: 1px solid var(--border); padding-top: 24px; color: var(--muted); font-size: 0.8rem; margin-top: 64px; }
</style>
</head>
<body>
<div class="wrap">

  <a href="{{ "/" | relURL }}" class="back">← sandakelum.me</a>

  <h1>gallery</h1>

  <div class="filter-tabs">
    <button class="filter-btn active" onclick="filter('all', this)">all</button>
    <button class="filter-btn" onclick="filter('travel', this)">travel</button>
    <button class="filter-btn" onclick="filter('pets', this)">pets</button>
  </div>

  <div class="gallery-grid" id="gallery">
    {{ range .Params.photos }}
    <div class="gallery-item" data-category="{{ .category }}"
         onclick="openLightbox('{{ printf "images/gallery/%s" .file | relURL }}', '{{ .location }}', '{{ .caption }}')">
      <img src="{{ printf "images/gallery/%s" .file | relURL }}"
           alt="{{ if .location }}{{ .location }}{{ else }}{{ .caption }}{{ end }}"
           loading="lazy">
      <div class="gallery-overlay">
        {{ with .location }}<div class="gallery-location">{{ . }}</div>{{ end }}
        {{ with .caption }}<div>{{ . }}</div>{{ end }}
      </div>
    </div>
    {{ end }}
  </div>

  <footer>
    built with hugo — &copy; {{ now.Format "2006" }} Sandakelum
  </footer>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
  function filter(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.gallery-item').forEach(item => {
      item.style.display = (cat === 'all' || item.dataset.category === cat) ? '' : 'none';
    });
  }

  function openLightbox(src, location, caption) {
    document.getElementById('lightbox-img').src = src;
    const parts = [location, caption].filter(Boolean);
    document.getElementById('lightbox-caption').textContent = parts.join(' — ');
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
