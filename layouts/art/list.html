<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art — Sandakelum</title>
{{ partial "seo.html" . }}
<style>
  :root {
    --bg: #0d0f12;
    --surface: #15181d;
    --text: #e6e6e6;
    --muted: #8b939e;
    --accent: #7ee787;
    --border: #232830;
    --mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); line-height: 1.6; font-size: 16px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
  .back { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; display: block; }
  .back:hover { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 32px; }
  h1::before { content: "// "; color: var(--accent); }
  .page-desc { color: var(--muted); font-size: 0.875rem; margin-top: -16px; margin-bottom: 28px; }

  .gallery {
    columns: 2;
    column-gap: 16px;
  }

  .art-item {
    break-inside: avoid;
    margin-bottom: 16px;
    cursor: pointer;
  }

  .art-item img {
    display: block;
    width: 100%;
    border-radius: 4px;
    filter: grayscale(15%) brightness(0.92);
    transition: filter 0.2s ease;
  }

  .art-item:hover img {
    filter: grayscale(0%) brightness(1);
  }

  .art-caption {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    padding: 6px 2px 0;
    font-size: 0.78rem;
  }

  .art-caption-title { color: var(--muted); }
  .art-caption-date { color: var(--accent); white-space: nowrap; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 4px;
    object-fit: contain;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
  }

  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  .lightbox-close:hover { color: var(--text); }

  footer { border-top: 1px solid var(--border); padding-top: 24px; color: var(--muted); font-size: 0.8rem; margin-top: 64px; }

  @media (max-width: 480px) {
    .wrap { padding: 40px 18px 64px; }
    h1 { font-size: 1.2rem; }
    .gallery { columns: 1; }
  }
</style>
</head>
<body>
<div class="wrap">

  <a href="{{ "/" | relURL }}" class="back">← sandakelum.me</a>

  <h1>art</h1>
  {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}

  {{ with .Params.art }}
  <div class="gallery">
    {{ range . }}
    <div class="art-item" data-src="/art/{{ .file }}">
      <img src="/art/{{ .file }}" alt="{{ .title }}" loading="lazy">
      <div class="art-caption">
        <span class="art-caption-title">{{ .title }}</span>
        <span class="art-caption-date">{{ .date }}</span>
      </div>
    </div>
    {{ end }}
  </div>
  {{ end }}

  <footer>
    built with hugo — &copy; {{ now.Format "2006" }} Sandakelum
  </footer>

</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
(function () {
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  var closeBtn = document.getElementById('lightbox-close');

  function open(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.art-item').forEach(function (item) {
    item.addEventListener('click', function () {
      open(item.dataset.src);
    });
  });

  closeBtn.addEventListener('click', close);

  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) close();
  });
})();
</script>
</body>
</html>
